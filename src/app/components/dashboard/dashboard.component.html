<div class="card">
    <div class="card-header text-center">
        This Month
        <div>{{currentDate}}</div>
    </div>
    <div class="card-body text-center">
       <div class="row">
            <div class="col-md-4">
                <div class="d-flex justify-content-between align-items-center">
                    <h5>Remaining Balance</h5>
                    <p> {{ balance }}</p>
                    <div style="width: 33.33%; height: 5px;"></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="d-flex justify-content-between align-items-center">
                    <h5>Toal Income </h5>
                    <p> {{ totalIncome }}</p>
                    <div style="width: 33.33%; height: 5px"></div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="d-flex justify-content-between align-items-center">
                    <h5>Total Expense </h5>
                    <p> {{ totalExpenses }}</p>
                    <div style="width: 33.33%; height: 5px"></div>
                </div>
            </div>
       </div>
       <div style="width: 100%; height: 5px"></div>
    </div>
</div>
<div style="width: 100%; height: 10px"></div>
<div class="row">
    <div class="col-md-7">
        <div class="card">
            <div class="card-header text-center">
                Pie Chart
            </div>
            <div class="card-body">
                <div id="chartdiv" style="width: 100%; height: 500px"></div>
            </div>
        </div>
    </div>
    <div class="col-md-5">
        <div class="card mb-3">
            <div class="card-header">
               This Month Income
            </div>
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <h5>Total income </h5>
                    <p> {{ totalIncome }}</p>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                This Month Expense
            </div>
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <h5>Total expense </h5>
                    <p> {{ totalExpenses }}</p>
            </div>
        </div>
    </div>
</div>
